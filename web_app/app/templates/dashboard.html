{% extends "base.html" %}

{% block title %}Панель управления{% endblock %}

{% block content %}
<div class="dashboard">
    <h1>Добро пожаловать!</h1>
    <a href="/logout">Выйти</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Заголовок</th>
                <th>Описание</th>
                <th>Дата создания</th>
            </tr>
        </thead>
        <tbody>
            {% for record in records %}
            <tr>
                <td>{{ record.id }}</td>
                <td>{{ record.title }}</td>
                <td>{{ record.description }}</td>
                <td>{{ record.created_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
